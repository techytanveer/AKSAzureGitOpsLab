apiVersion: v1
kind: Service
metadata:
  name: aksazuregitopslab
  namespace: default
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
spec:
  type: LoadBalancer
  selector:
    app: aksazuregitopslab
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
