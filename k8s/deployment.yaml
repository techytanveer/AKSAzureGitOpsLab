apiVersion: apps/v1
kind: Deployment
metadata:
  name: aksazuregitopslab
  namespace: default
  labels:
    app: aksazuregitopslab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aksazuregitopslab
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aksazuregitopslab
    spec:
      containers:
        - name: aksazuregitopslab
          image: REGISTRY_NAME.azurecr.io/aksazuregitopslab:IMAGE_TAG   # replaced by CI
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: aksazuregitopslab
